name: Accessibility Scanner
on: [push, workflow_dispatch]

jobs:
  scan_radancy_dev:
    runs-on: ubuntu-latest
    steps:
      - uses: github/accessibility-scanner@v3
        with:
          urls: |
            https://radancy.dev
            https://radancy.dev/a11y/
            https://radancy.dev/a11y/pulse/
            https://radancy.dev/a11y/pulse/component/
            https://radancy.dev/a11y/baseline/
            https://radancy.dev/bookmarklet/
            https://radancy.dev/uid/
          repository: radancyco/radancyco.github.io
          token: ${{ secrets.GH_TOKEN }}
          cache_key: a11y-scan-v1
