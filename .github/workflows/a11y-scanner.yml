name: Accessibility Scanner
on: push

jobs:
  scan_radancy_dev:
    runs-on: ubuntu-latest
    steps:
      - uses: github/accessibility-scanner@v3
        with:
          urls: https://radancy.dev
          repository: radancyco/radancyco.github.io
          token: ${{ secrets.GH_TOKEN }}
          cache_key: a11y-scan-v1
